<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Post Gallery</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg-light: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-light); color: var(--primary); }

        header {
            background: #fff; height: 60px; display: flex; align-items: center;
            padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .back-btn {
            text-decoration: none; color: white; background: var(--primary);
            width: 32px; height: 32px; display: flex; justify-content: center;
            align-items: center; border-radius: 50%; margin-right: 12px;
        }

        header h2 { font-size: 16px; font-weight: 700; }

        .content-container { padding: 15px; max-width: 900px; margin: 0 auto; }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
        }

        .post-card {
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none;
            color: inherit; transition: 0.3s; border: 1px solid rgba(0,0,0,0.02);
        }

        .post-card:active { transform: scale(0.96); }

        .post-thumbnail { width: 100%; aspect-ratio: 16 / 9; background: #eee; }
        .post-thumbnail img { width: 100%; height: 100%; object-fit: cover; }

        .post-info { padding: 10px; text-align: center; }
        .post-info h3 {
            font-size: 14px; color: #2c3e50; font-weight: 600; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .loading-text { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; }

        @media (min-width: 768px) { .grid-list { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1000px) { .grid-list { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">❮</a>
        <h2 id="page-title">लोड हुँदैछ...</h2>
    </header>

    <div class="content-container">
        <div id="loader" class="loading-text">सामग्री लोड हुँदैछ...</div>
        <div id="posts-list" class="grid-list">
            </div>
    </div>

    <script>
        // १. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA9_D2PC78t5LTpST4Sx23_74OtTyxoEE4",
            authDomain: "education-58e7b.firebaseapp.com",
            projectId: "education-58e7b",
            storageBucket: "education-58e7b.firebasestorage.app",
            messagingSenderId: "661874475829",
            appId: "1:661874475829:web:dc74079c8c25ef56b0427c",
            databaseURL: "https://education-58e7b-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // २. URL बाट क्याटेगोरी (cat) र उप-क्याटेगोरी (sub) तान्ने
        const urlParams = new URLSearchParams(window.location.search);
        const cat = urlParams.get('cat');
        const sub = urlParams.get('sub');

        function loadPostsFromFirebase() {
            const listElement = document.getElementById('posts-list');
            const loader = document.getElementById('loader');
            const titleElement = document.getElementById('page-title');

            if (!cat || !sub) {
                loader.innerText = "Error: URL मा जानकारी अधुरो छ।";
                return;
            }

            titleElement.innerText = sub; // 'खरिदार' वा 'नेपाली सेना' शीर्षक राख्ने

            // डेटाबेस पाथ मिलाउने (तपाईँको डेटा संरचना अनुसार)
            const dbPath = `posts/${cat}/${sub}`;

            database.ref(dbPath).on('value', (snapshot) => {
                listElement.innerHTML = "";
                loader.style.display = "none";
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const post = childSnapshot.val();
                        const postId = childSnapshot.key;
                        
                        // इमेज देखाउन 'thumbnail' वा 'image' दुवै चेक गर्ने
                        const displayImage = post.thumbnail || post.image || 'https://via.placeholder.com/300x170?text=No+Image';

                        const card = document.createElement('a');
                        // पोस्टको आईडी र पाथ सहित पठाउने
                        card.href = `post-detail.html?id=${postId}&cat=${cat}&sub=${encodeURIComponent(sub)}`;
                        card.className = 'post-card';
                        card.innerHTML = `
                            <div class="post-thumbnail">
                                <img src="${displayImage}" alt="Thumb" onerror="this.src='https://via.placeholder.com/300x170?text=No+Image'">
                            </div>
                            <div class="post-info">
                                <h3>${post.title || "बिना शीर्षक"}</h3>
                            </div>
                        `;
                        listElement.appendChild(card);
                    });
                } else {
                    loader.innerText = "यस क्याटेगोरीमा अहिलेसम्म कुनै सामग्री राखिएको छैन।";
                    loader.style.display = "block";
                }
            }, (error) => {
                console.error(error);
                loader.innerText = "डाटा लोड गर्न अनुमति छैन (Permission Denied)। Rules चेक गर्नुहोस्।";
            });
        }

        window.onload = loadPostsFromFirebase;
    </script>
</body>
</html>
