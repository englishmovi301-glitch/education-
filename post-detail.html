<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विवरण | Post Details</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* प्रष्ट र मोटो फन्ट */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700;800;900&display=swap');

        :root {
            --primary: #1a1a1a;
            --accent: #2980b9;
            --bg-light: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Devanagari', sans-serif; }
        body { background: #f0f2f5; color: #000; line-height: 1.6; }

        header {
            background: #fff; height: 65px; display: flex; align-items: center;
            padding: 0 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .back-btn { text-decoration: none; color: #000; font-size: 28px; margin-right: 15px; font-weight: 900; }
        header h2 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

        .container { max-width: 800px; margin: 0 auto; background: #fff; min-height: 100vh; }

        .feature-image { width: 100%; display: none; background: #eee; }
        .feature-image img { width: 100%; height: auto; display: block; }

        .post-content { padding: 25px 15px; }
        
        .post-title { 
            font-size: 28px; font-weight: 900; line-height: 1.2; 
            margin-bottom: 15px; letter-spacing: -1px; color: #000;
        }

        .post-meta {
            font-size: 14px; color: #444; margin-bottom: 25px;
            display: flex; gap: 15px; border-bottom: 3px solid #000; padding-bottom: 10px;
            font-weight: 700;
        }

        .post-body { 
            font-size: 21px; color: #000; white-space: pre-wrap; 
            line-height: 1.7; font-weight: 700; letter-spacing: -0.5px;
        }

        .loader { text-align: center; padding: 100px 20px; font-weight: 900; font-size: 20px; color: #888; }
        .footer-nav { padding: 40px 20px; text-align: center; }
        .home-btn {
            display: inline-block; background: #000; color: white; padding: 14px 35px;
            text-decoration: none; border-radius: 8px; font-weight: 900; font-size: 18px;
क        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" class="back-btn">❮</a>
        <h2 id="header-title">विवरण</h2>
    </header>

    <div class="container">
        <div id="loader" class="loader">लोड हुँदैछ...</div>

        <div id="post-data" style="display: none;">
            <div id="image-container" class="feature-image">
                <img id="main-img" src="">
            </div>

            <article class="post-content">
                <h1 class="post-title" id="display-title"></h1>
                <div class="post-meta">
                    <span id="display-date">📅 हालै</span>
                    <span id="display-category">📁 सामान्य</span>
                </div>
                <div id="display-body" class="post-body"></div>
            </article>

            <div class="footer-nav">
                <a href="index.html" class="home-btn">मुख्य पेजमा फर्कनुहोस्</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA9_D2PC78t5LTpST4Sx23_74OtTyxoEE4",
            authDomain: "education-58e7b.firebaseapp.com",
            projectId: "education-58e7b",
            databaseURL: "https://education-58e7b-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // URL बाट दुबै प्रकारका पारामिटर लिने (पुरानो: cat/sub, नयाँ: type/id)
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat') || urlParams.get('type');
        const postId = urlParams.get('sub') || urlParams.get('id');

        if (category && postId) {
            
            // १. पहिले सिधै 'news/id' वा 'vacancies/id' मा खोज्ने (नयाँ news.html को लागि)
            database.ref(category + '/' + postId).once('value').then((snapshot) => {
                let data = snapshot.val();
                
                // २. यदि त्यहाँ भेटिएन भने 'posts/cat/sub' मा खोज्ने (पुरानो ड्यासबोर्डको लागि)
                if (!data) {
                    return database.ref('posts/' + category + '/' + postId).once('value');
                }
                return snapshot;
            }).then((snapshot) => {
                const post = snapshot.val();
                if (post) {
                    renderContent(post);
                } else {
                    document.getElementById('loader').innerText = "डाटा फेला परेन।";
                }
            }).catch(() => {
                document.getElementById('loader').innerText = "लोड गर्दा समस्या भयो।";
            });

        } else {
            document.getElementById('loader').innerText = "ID उपलब्ध छैन।";
        }

        function renderContent(data) {
            // यदि डाटा भित्र थप नेस्टेड की (key) छ भने पहिलो की लिने
            let post = (data.title || data.content || data.description) ? data : data[Object.keys(data)[0]];

            document.getElementById('display-title').innerText = post.title || "शीर्षक";
            document.getElementById('header-title').innerText = (post.title || "विवरण").substring(0, 20) + "...";
            document.getElementById('display-body').innerText = post.content || post.description || post.desc || post.body || "";
            
            // इमेज सेटअप
            const imgUrl = post.image || post.thumbnail || post.img;
            if (imgUrl) {
                document.getElementById('main-img').src = imgUrl;
                document.getElementById('image-container').style.display = "block";
            }

            // मिति र क्याटेगोरी
            if (post.time || post.deadline || post.timestamp) {
                const dateText = post.time || post.deadline || new Date(post.timestamp).toLocaleDateString();
                document.getElementById('display-date').innerText = "📅 " + dateText;
            }
            document.getElementById('display-category').innerText = "📁 " + (post.category || category);

            // UI देखाउने
            document.getElementById('loader').style.display = "none";
            document.getElementById('post-data').style.display = "block";
        }
    </script>
</body>
</html>
