<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Daily Paisa</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #1a2634; --card: #243447; --yellow: #f1c40f; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #1a2634; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--yellow); color: #1a2634; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-text { margin-top: 15px; font-size: 13px; color: #bdc3c7; cursor: pointer; }
        .toggle-text span { color: var(--yellow); }
        #msg { color: #ff7675; font-size: 13px; margin-top: 10px; display: none; }
        #loader { display: none; margin-top: 10px; color: var(--yellow); }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="title" style="color: var(--yellow); margin-bottom: 20px;">रजिस्टर गर्नुहोस्</h2>
        
        <input type="text" id="u-name" placeholder="पुरा नाम">
        <input type="email" id="u-email" placeholder="इमेल">
        <input type="password" id="u-pass" placeholder="पासवर्ड">
        
        <p id="msg"></p> <button class="btn" onclick="handleAuth()">सुरु गर्नुहोस्</button>
        
        <p class="toggle-text" onclick="toggleForm()">
            <span id="toggle-link">पहिले नै खाता छ? लगइन गर्नुहोस्</span>
        </p>

        <div id="loader">प्रक्रिया हुँदैछ...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9_D2PC78t5LTpST4Sx23_74OtTyxoEE4",
            authDomain: "education-58e7b.firebaseapp.com",
            projectId: "education-58e7b",
            storageBucket: "education-58e7b.firebasestorage.app",
            messagingSenderId: "661874475829",
            appId: "1:661874475829:web:dc74079c8c25ef56b0427c"
        };

        firebase.initializeApp(firebaseConfig);
        let isRegister = true;

        function toggleForm() {
            isRegister = !isRegister;
            document.getElementById("title").innerText = isRegister ? "रजिस्टर गर्नुहोस्" : "लगइन गर्नुहोस्";
            document.getElementById("u-name").style.display = isRegister ? "block" : "none";
            document.getElementById("toggle-link").innerText = isRegister ? "पहिले नै खाता छ? लगइन गर्नुहोस्" : "नयाँ खाता चाहियो? रजिस्टर गर्नुहोस्";
        }

        function handleAuth() {
            const email = document.getElementById("u-email").value;
            const pass = document.getElementById("u-pass").value;
            const name = document.getElementById("u-name").value;
            const msg = document.getElementById("msg");

            if(!email || !pass) {
                msg.style.display = "block";
                msg.innerText = "कृपया सबै विवरण भर्नुहोस्।";
                return;
            }

            document.getElementById("loader").style.display = "block";
            msg.style.display = "none";

            if (isRegister) {
                firebase.auth().createUserWithEmailAndPassword(email, pass)
                    .then((res) => res.user.updateProfile({displayName: name}))
                    .then(() => goProfile(firebase.auth().currentUser))
                    .catch(e => showError(e.message));
            } else {
                firebase.auth().signInWithEmailAndPassword(email, pass)
                    .then((res) => goProfile(res.user))
                    .catch(e => showError(e.message));
            }
        }

        function showError(m) {
            document.getElementById("loader").style.display = "none";
            const msg = document.getElementById("msg");
            msg.style.display = "block";
            msg.innerText = m;
        }

        function goProfile(user) {
            localStorage.setItem("userName", user.displayName || "User");
            localStorage.setItem("userEmail", user.email);
            window.location.replace("profile.html");
        }
    </script>
</body>
</html>
